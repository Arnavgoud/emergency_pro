{% extends "base.html" %}
{% block content %}

<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">

    <div class="row w-100 justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">

            <div class="card shadow-lg border-0 p-4 text-center">

                <h3 class="text-danger fw-bold mb-2">Emergency SOS</h3>
                <p class="text-muted mb-4">Press immediately in case of emergency</p>

                <form method="POST">

                    <!-- Hidden GPS Fields -->
                    <input type="hidden" name="latitude" id="latitude">
                    <input type="hidden" name="longitude" id="longitude">

                    <!-- SOS Button -->
                    <div class="d-flex justify-content-center mb-4">
                        <button type="submit" class="btn btn-danger rounded-circle shadow"
                                style="width:150px; height:150px; font-size:28px;">
                            SOS
                        </button>
                    </div>

                    <!-- Emergency Type -->
                    <select name="type" class="form-select" required>
                        <option value="">Select Emergency Type</option>
                        <option value="Medical">Medical</option>
                        <option value="Crime">Crime</option>
                        <option value="Fire">Fire</option>
                        <option value="Accident">Accident</option>
                    </select>

                </form>

            </div>
        </div>
    </div>
</div>

<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById("latitude").value = position.coords.latitude;
            document.getElementById("longitude").value = position.coords.longitude;
        });
    } else {
        alert("Geolocation is not supported by this browser.");
    }
}

window.onload = getLocation;
</script>

{% endblock %}
