<!DOCTYPE html>
<html>
<head>

<title>Emergency SOS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container text-center mt-5">

<h1 class="text-danger mb-3">Emergency SOS</h1>

<p class="text-muted">Press immediately in case of emergency</p>


<select id="emergency-type" class="form-select w-50 mx-auto mb-4">

<option value="crime">Crime</option>
<option value="medical">Medical</option>
<option value="fire">Fire</option>

</select>


<div class="d-flex justify-content-center mb-4">

<button id="sos-btn"
type="button"
class="btn btn-danger rounded-circle shadow"
style="width:150px; height:150px; font-size:28px;">

SOS

</button>

</div>

</div>


<script src="/static/js/main.js"></script>

</body>
</html>
