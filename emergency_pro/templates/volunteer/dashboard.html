{% extends "base.html" %}
{% block content %}

<!-- Top Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">Emergency Response System</span>
        <div class="ms-auto">
            <span class="badge bg-light text-dark me-3">Volunteer</span>
            <button class="btn btn-sm btn-outline-light">Logout</button>
        </div>
    </div>
</nav>

<div class="container-fluid p-4">

    <h3 class="mb-4 fw-bold">Volunteer Dashboard</h3>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm border-0 p-3">
                <h6 class="text-muted">Total Assigned</h6>
                <h3 class="fw-bold text-primary">5</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0 p-3">
                <h6 class="text-muted">Active Emergencies</h6>
                <h3 class="fw-bold text-danger">2</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0 p-3">
                <h6 class="text-muted">Completed</h6>
                <h3 class="fw-bold text-success">3</h3>
            </div>
        </div>

    </div>

    <div class="card shadow-sm border-0 mt-4 p-3">
        <h5 class="mb-3">Nearby Emergencies</h5>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Type</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Medical</td>
                        <td>Hyderabad</td>
                        <td><span class="badge bg-danger">Active</span></td>
                        <td><button class="btn btn-sm btn-primary">Accept</button></td>
                    </tr>
                    <tr>
                        <td>Crime</td>
                        <td>Warangal</td>
                        <td><span class="badge bg-warning text-dark">Pending</span></td>
                        <td><button class="btn btn-sm btn-primary">Accept</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

{% endblock %}
